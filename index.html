<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉義分部物資借閱系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; --danger: #e53e3e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 10px; margin: 0; }
        .header-box { background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .view-switcher { display: flex; gap: 5px; margin-top: 10px; }
        .mode-btn { flex: 1; padding: 8px; border: 1px solid #ddd; background: white; border-radius: 6px; font-size: 13px; cursor: pointer; color: #666; }
        .mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: bold; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .photo { width: 100%; object-fit: cover; background: #eee; }
        .content { padding: 12px; }
        .status-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 5px; }
        .available { background: #dcfce7; color: #166534; }
        .borrowed { background: #fee2e2; color: #991b1b; }
        .due-text { font-size: 11px; color: var(--danger); margin-left: 5px; }
        .name { font-weight: bold; font-size: 17px; margin-bottom: 5px; color: #2d3748; }
        #app.view-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .view-grid .photo { height: 120px; }
        .view-list .card { display: flex; align-items: center; height: 90px; margin-bottom: 8px; }
        .view-list .photo { width: 80px; height: 90px; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; margin-top: 8px; font-weight: bold; cursor: pointer; color: white; }
        .btn-blue { background: var(--primary); }
        .btn-gray { background: #6c757d; }
        #detail-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-body { background: white; width: 85%; max-height: 80%; border-radius: 15px; padding: 20px; overflow-y: auto; }
        .input-group { margin: 12px 0; }
        label { display: block; font-size: 11px; color: #718096; margin-bottom: 3px; }
        input { width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }
        .detail-title { font-weight: bold; color: #2d3748; margin: 10px 0 5px 0; font-size: 14px; }
        .detail-box { background: #f8fafc; padding: 8px; border-radius: 6px; font-size: 13px; line-height: 1.5; color: #4a5568; }
    </style>
</head>
<body>
    <div class="header-box">
        <div id="user-info">系統載入中...</div>
        <div class="view-switcher">
            <button class="mode-btn active" onclick="switchView('card', this)">大圖</button>
            <button class="mode-btn" onclick="switchView('grid', this)">網格</button>
            <button class="mode-btn" onclick="switchView('list', this)">清單</button>
        </div>
    </div>
    <div id="app" class="view-card"></div>
    <div id="detail-modal">
        <div class="modal-body">
            <h3 id="modal-title" style="margin-top:0"></h3>
            <div class="detail-title">[ 推薦理由與引導建議 ]</div>
            <div id="modal-desc" class="detail-box"></div>
            <div class="detail-title">[ 配件核對 ]</div>
            <div id="modal-checklist" class="detail-box"></div>
            <div class="detail-title">[ 清潔指南 ]</div>
            <div id="modal-clean" class="detail-box"></div>
            <div class="detail-title">[ 備註 ]</div>
            <div id="modal-remarks" class="detail-box"></div>
            <hr style="border:0; border-top:1px solid #eee; margin:15px 0">
            <div class="input-group"><label>Email (通知用)</label><input type="email" id="borrow-email"></div>
            <div class="input-group"><label>預計歸還日</label><input type="date" id="borrow-date"></div>
            <button class="btn btn-blue" onclick="confirmBorrow()">確認登記借用</button>
            <button class="btn btn-gray" style="background:#f1f5f9; color:#666" onclick="closeModal()">返回</button>
        </div>
    </div>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyxtge8LVGHeu0Uag82TqkypW7GF32rEKvZ4E5-PHyUKUSbEShBxkyxz-DK2XJ3f_Qm/exec"; 
        const LIFF_ID = "2009125879-jcbSh64X";
        let inventoryData = [], currentItem = null, profile = {};
        async function init() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            profile = await liff.getProfile();
            document.getElementById('user-info').innerText = `👋 你好，${profile.displayName}`;
            fetchData();
        }
        async function fetchData() {
            const resp = await fetch(`${GAS_URL}?action=getInventory`);
            inventoryData = await resp.json();
            render();
        }
        function switchView(mode, btn) {
            document.getElementById('app').className = `view-${mode}`;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        function render() {
            const app = document.getElementById('app');
            app.innerHTML = inventoryData.map(item => `
                <div class="card">
                    <img src="${item.photo}" class="photo" onerror="this.src='https://via.placeholder.com/300?text=無照片'">
                    <div class="content">
                        <div class="status-tag ${item.status === '可用' ? 'available' : 'borrowed'}">
                            ${item.status} ${item.status !== '可用' ? `<span class="due-text">(還：${item.dueDate})</span>` : ''}
                        </div>
                        <div class="name">${item.name}</div>
                        <button class="btn ${item.status === '可用' ? 'btn-blue' : 'btn-gray'}" onclick="${item.status === '可用' ? `showDetail('${item.name}')` : `handleReturn('${item.name}')`}">
                            ${item.status === '可用' ? '查看詳情 / 借閱' : '歸還'}
                        </button>
                    </div>
                </div>
            `).join('');
        }
        function showDetail(name) {
            currentItem = inventoryData.find(i => i.name === name);
            document.getElementById('modal-title').innerText = currentItem.name;
            document.getElementById('modal-desc').innerText = currentItem.recommend || "無";
            document.getElementById('modal-checklist').innerText = currentItem.checkList || "無";
            document.getElementById('modal-clean').innerText = currentItem.cleanGuide || "無";
            document.getElementById('modal-remarks').innerText = currentItem.remarks || "無";
            const dt = new Date(); dt.setDate(dt.getDate() + 14);
            document.getElementById('borrow-date').value = dt.toISOString().split('T')[0];
            document.getElementById('detail-modal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }
        async function confirmBorrow() {
            const email = document.getElementById('borrow-email').value, date = document.getElementById('borrow-date').value;
            if (!email.includes("@")) return alert("Email 格式錯誤");
            const api = `${GAS_URL}?action=process&type=借出&itemName=${encodeURIComponent(currentItem.name)}&userName=${encodeURIComponent(profile.displayName)}&userEmail=${encodeURIComponent(email)}&dueDate=${encodeURIComponent(date)}`;
            await fetch(api);
            alert("借閱成功並已寄出通知信！");
            location.reload();
        }
        async function handleReturn(name) {
            if(!confirm(`歸還 [${name}]？`)) return;
            const api = `${GAS_URL}?action=process&type=歸還&itemName=${encodeURIComponent(name)}&userName=${encodeURIComponent(profile.displayName)}&userEmail=-&dueDate=-`;
            await fetch(api);
            alert("歸還成功！");
            location.reload();
        }
        init();
    </script>
</body>
</html>
