<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>嘉義分部物資借閱</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; background: #f7fafc; margin: 0; padding: 15px; }
    .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
    .photo { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
    .status-tag { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 8px; }
    .available { background: #c6f6d5; color: #22543d; }
    .borrowed { background: #fed7d7; color: #822727; }
    .btn { background: #4299e1; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 12px; font-size: 16px; cursor: pointer; }
    .recommend { font-size: 14px; color: #4a5568; margin: 12px 0; line-height: 1.5; background: #f8fafc; padding: 10px; border-radius: 6px; }
    #loading { text-align: center; padding: 50px; color: #718096; }
  </style>
</head>
<body>
  <div id="user-info" style="padding: 10px; font-weight: bold; color: #2d3748;">正在載入使用者資訊...</div>
  <div id="loading">📚 正在載入清單，請稍候...</div>
  <div id="app"></div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyxtge8LVGHeu0Uag82TqkypW7GF32rEKvZ4E5-PHyUKUSbEShBxkyxz-DK2XJ3f_Qm/exec"; // 貼上剛才部署的網址
    let currentUser = { name: "" };

    async function initLiff() {
      try {
        await liff.init({ liffId: "2009125879-jcbSh64X" });
        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          const profile = await liff.getProfile();
          currentUser.name = profile.displayName;
          document.getElementById('user-info').innerText = `你好，${currentUser.name}`;
          fetchData();
        }
      } catch (err) {
        console.error("LIFF 載入失敗", err);
      }
    }

    async function fetchData() {
      const resp = await fetch(`${GAS_URL}?action=getInventory`);
      const data = await resp.json();
      render(data);
    }

    function render(data) {
      document.getElementById('loading').style.display = 'none';
      const app = document.getElementById('app');
      app.innerHTML = data.map(item => `
        <div class="card">
          <img src="${item.photo}" class="photo" onerror="this.src='https://via.placeholder.com/300x200?text=圖片載入中'">
          <div style="font-size: 18px; font-weight: bold; margin-top: 10px;">${item.name}</div>
          <div class="status-tag ${item.status === '可用' ? 'available' : 'borrowed'}">${item.status}</div>
          <div class="recommend">${item.recommend}</div>
          <div style="font-size: 12px; color: #a0aec0;">配件核對：${item.checkList}</div>
          ${item.status === '可用' ? 
            `<button class="btn" onclick="handleBorrow('${item.name}')">我要借用</button>` : 
            `<button class="btn" style="background:#cbd5e0" onclick="handleReturn('${item.name}')">辦理歸還</button>`
          }
        </div>
      `).join('');
    }

    async function handleBorrow(name) {
      const email = prompt("請輸入您的 Email：");
      if (!email || !email.includes("@")) return alert("請填寫正確 Email");
      const date = prompt("請預計歸還日期 (YYYY-MM-DD)：");
      if (!date) return;

      if (!confirm(`確定借用 [${name}]？`)) return;

      const res = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "借出", itemName: name, userName: currentUser.name, userEmail: email, dueDate: date
        })
      });
      
      alert("借閱成功！");
      liff.sendMessages([{ type: 'text', text: `📖 我已借閱 [${name}]\n預計歸還：${date}` }]);
      location.reload();
    }

    async function handleReturn(name) {
      if (!confirm(`確認歸還 [${name}]？`)) return;
      await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ action: "歸還", itemName: name, userName: currentUser.name, userEmail: "-", dueDate: "-" })
      });
      alert("歸還成功！");
      liff.sendMessages([{ type: 'text', text: `✅ 我已歸還 [${name}]` }]);
      location.reload();
    }

    initLiff();
  </script>
</body>
</html>
