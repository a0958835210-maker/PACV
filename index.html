<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉義分部物資借閱系統</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; --danger: #e53e3e; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 10px; margin: 0; }
        
        /* 使用者資訊與模式切換 */
        .header-box { background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .view-switcher { display: flex; gap: 5px; margin-top: 10px; }
        .mode-btn { flex: 1; padding: 8px; border: 1px solid #ddd; background: white; border-radius: 6px; font-size: 13px; cursor: pointer; color: #666; }
        .mode-btn.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: bold; }

        /* 內容容器樣式 */
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; position: relative; }
        .photo { width: 100%; object-fit: cover; background: #eee; }
        .content { padding: 12px; }
        .status-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 5px; }
        .available { background: #dcfce7; color: #166534; }
        .borrowed { background: #fee2e2; color: #991b1b; }
        .due-text { font-size: 11px; color: var(--danger); margin-left: 5px; font-weight: normal; }
        .name { font-weight: bold; font-size: 17px; margin-bottom: 5px; color: #2d3748; }
        
        /* --- 模式 1: 大圖卡片 (Card) --- */
        .view-card .photo { height: 200px; }

        /* --- 模式 2: 網格 (Grid) --- */
        #app.view-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .view-grid .card { margin-bottom: 0; }
        .view-grid .photo { height: 120px; }
        .view-grid .name { font-size: 14px; height: 38px; overflow: hidden; }
        .view-grid .recommend { display: none; }

        /* --- 模式 3: 清單 (List) --- */
        .view-list .card { display: flex; align-items: center; margin-bottom: 8px; height: 90px; }
        .view-list .photo { width: 80px; height: 90px; }
        .view-list .content { flex: 1; padding: 10px; }
        .view-list .name { font-size: 15px; }
        .view-list .recommend { display: none; }
        .view-list .btn { width: auto; padding: 4px 10px; font-size: 12px; margin-top: 5px; }

        /* 按鈕樣式 */
        .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; margin-top: 8px; font-weight: bold; cursor: pointer; color: white; }
        .btn-blue { background: var(--primary); }
        .btn-gray { background: #6c757d; }

        /* 詳細資訊彈窗 (Modal) */
        #detail-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-body { background: white; width: 85%; max-height: 80%; border-radius: 15px; padding: 20px; overflow-y: auto; position: relative; }
        .input-group { margin: 15px 0; }
        label { display: block; font-size: 12px; color: #718096; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header-box">
        <div id="user-info" style="font-weight: bold; color: #4a5568;">系統連線中...</div>
        <div class="view-switcher">
            <button class="mode-btn active" onclick="switchView('card', this)">大圖</button>
            <button class="mode-btn" onclick="switchView('grid', this)">網格</button>
            <button class="mode-btn" onclick="switchView('list', this)">清單</button>
        </div>
    </div>

    <div id="status-msg" style="text-align:center; padding: 20px; color: #a0aec0;">正在準備精選繪本與教具...</div>
    <div id="app" class="view-card"></div>

    <div id="detail-modal">
        <div class="modal-body">
            <h3 id="modal-title" style="margin: 0 0 10px 0; color: #2d3748;"></h3>
            <div id="modal-desc" style="font-size: 14px; color: #4a5568; background: #f8fafc; padding: 10px; border-radius: 8px; line-height: 1.5;"></div>
            <div style="font-size: 12px; color: #718096; margin-top: 10px;">配件核對：<span id="modal-checklist"></span></div>
            
            <div class="input-group">
                <label>您的常用 Email (逾期通知用)</label>
                <input type="email" id="borrow-email" placeholder="請填寫 Email">
            </div>
            <div class="input-group">
                <label>預計歸還日期 (系統預設借期 14 天)</label>
                <input type="date" id="borrow-date">
            </div>
            
            <button class="btn btn-blue" onclick="confirmBorrow()">確認登記並借用</button>
            <button class="btn btn-gray" style="background:#f1f5f9; color:#64748b" onclick="closeModal()">返回</button>
        </div>
    </div>

    <script>
        // --- 務必確認以下資訊與您的設定一致 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyxtge8LVGHeu0Uag82TqkypW7GF32rEKvZ4E5-PHyUKUSbEShBxkyxz-DK2XJ3f_Qm/exec"; 
        const LIFF_ID = "2009125879-jcbSh64X";
        
        let inventoryData = [];
        let currentItem = null;
        let profile = {};

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                profile = await liff.getProfile();
                document.getElementById('user-info').innerText = `👋 您好，${profile.displayName}`;
                fetchData();
            } catch (err) { console.error("LIFF 初始化失敗", err); }
        }

        async function fetchData() {
            try {
                const response = await fetch(`${GAS_URL}?action=getInventory`);
                inventoryData = await response.json();
                render();
            } catch (err) {
                document.getElementById('status-msg').innerText = "連線失敗，請稍後再試。";
            }
        }

        function switchView(mode, btn) {
            document.getElementById('app').className = `view-${mode}`;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function render() {
            document.getElementById('status-msg').style.display = 'none';
            const app = document.getElementById('app');
            app.innerHTML = inventoryData.map(item => `
                <div class="card">
                    <img src="${item.photo}" class="photo" onerror="this.src='https://via.placeholder.com/300?text=圖片載入中'">
                    <div class="content">
                        <div class="status-tag ${item.status === '可用' ? 'available' : 'borrowed'}">
                            ${item.status}
                            ${item.status !== '可用' ? `<span class="due-text">(還：${item.dueDate || '-'})</span>` : ''}
                        </div>
                        <div class="name">${item.name}</div>
                        <div class="recommend" style="font-size: 12px; color: #718096; margin-bottom: 5px;">${item.recommend}</div>
                        <button class="btn ${item.status === '可用' ? 'btn-blue' : 'btn-gray'}" 
                                onclick="${item.status === '可用' ? `showDetail('${item.name}')` : `handleReturn('${item.name}')`}">
                            ${item.status === '可用' ? '查看詳情 / 借閱' : '辦理歸還'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function showDetail(name) {
            currentItem = inventoryData.find(i => i.name === name);
            document.getElementById('modal-title').innerText = currentItem.name;
            document.getElementById('modal-desc').innerText = currentItem.recommend;
            document.getElementById('modal-checklist').innerText = currentItem.checkList || "無特別註記";
            
            // 自動預設 14 天後
            const dt = new Date();
            dt.setDate(dt.getDate() + 14);
            document.getElementById('borrow-date').value = dt.toISOString().split('T')[0];
            
            document.getElementById('detail-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }

        async function confirmBorrow() {
            const email = document.getElementById('borrow-email').value;
            const date = document.getElementById('borrow-date').value;

            if (!email.includes("@")) { alert("請填寫正確的 Email 格式。"); return; }
            if (!date) { alert("請選擇預計歸還日期。"); return; }

            document.getElementById('detail-modal').style.opacity = "0.5";
            const api = `${GAS_URL}?action=process&type=借出&itemName=${encodeURIComponent(currentItem.name)}&userName=${encodeURIComponent(profile.displayName)}&userEmail=${encodeURIComponent(email)}&dueDate=${encodeURIComponent(date)}`;
            
            try {
                await fetch(api);
                alert("登記成功！請記得帶走教具喔。");
                liff.sendMessages([{ type: 'text', text: `📖 已借閱 [${currentItem.name}]\n預計歸還日：${date}` }]);
                location.reload();
            } catch (err) { alert("系統繁忙，請稍後再試。"); location.reload(); }
        }

        async function handleReturn(name) {
            if(!confirm(`確認要歸還 [${name}] 嗎？`)) return;
            const api = `${GAS_URL}?action=process&type=歸還&itemName=${encodeURIComponent(name)}&userName=${encodeURIComponent(profile.displayName)}&userEmail=-&dueDate=-`;
            try {
                await fetch(api);
                alert("歸還成功，感謝分享！");
                liff.sendMessages([{ type: 'text', text: `✅ 已歸還 [${name}]` }]);
                location.reload();
            } catch (err) { alert("歸還失敗"); }
        }

        init();
    </script>
</body>
</html>
