<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉義分部物資借閱</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .photo { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; background: #eee; }
        .status-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 10px; }
        .available { background: #dcfce7; color: #166534; }
        .borrowed { background: #fee2e2; color: #991b1b; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; margin-top: 12px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; }
        .btn-blue { background: #007bff; }
        .btn-gray { background: #6c757d; }
    </style>
</head>
<body>
    <div id="user-info" style="font-weight: bold; margin-bottom: 10px; color: #333;">系統啟動中...</div>
    <div id="status-msg" style="color: #666; font-size: 14px;">正在讀取清單...</div>
    <div id="app"></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyxtge8LVGHeu0Uag82TqkypW7GF32rEKvZ4E5-PHyUKUSbEShBxkyxz-DK2XJ3f_Qm/exec"; 
        const LIFF_ID = "2009125879-jcbSh64X";
        let profile = {};

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                profile = await liff.getProfile();
                document.getElementById('user-info').innerText = `你好，${profile.displayName}`;
                fetchData();
            } catch (err) {
                document.getElementById('status-msg').innerText = "LIFF 初始化失敗。";
            }
        }

        async function fetchData() {
            try {
                const response = await fetch(`${GAS_URL}?action=getInventory`);
                const data = await response.json();
                render(data);
            } catch (err) {
                document.getElementById('status-msg').innerText = "無法連線至資料庫，請檢查 GAS 部署權限。";
            }
        }

        function render(data) {
            document.getElementById('status-msg').style.display = 'none';
            const app = document.getElementById('app');
            app.innerHTML = data.map(item => `
                <div class="card">
                    <img src="${item.photo}" class="photo" onerror="this.src='https://via.placeholder.com/300x200?text=無照片'">
                    <div style="font-size: 18px; font-weight: bold; margin-top: 10px;">${item.name}</div>
                    <div class="status-tag ${item.status === '可用' ? 'available' : 'borrowed'}">${item.status}</div>
                    <div style="font-size: 14px; color: #444; margin: 10px 0;">${item.recommend}</div>
                    <div style="font-size: 12px; color: #888;">配件：${item.checkList}</div>
                    ${item.status === '可用' ? 
                        `<button class="btn btn-blue" onclick="doAction('${item.name}', '借出')">立即借用</button>` : 
                        `<button class="btn btn-gray" onclick="doAction('${item.name}', '歸還')">辦理歸還</button>`
                    }
                </div>
            `).join('');
        }

        async function doAction(itemName, type) {
            let email = "-";
            let date = "-";
            
            if (type === '借出') {
                email = prompt("請輸入您的 Email (通知用)：");
                if (!email || !email.includes("@")) return alert("格式錯誤");
                date = prompt("預計歸還日期 (YYYY/MM/DD)：");
                if (!date) return;
            }

            if (!confirm(`確認要${type} [${itemName}] 嗎？`)) return;

            document.getElementById('app').style.opacity = "0.3";
            const api = `${GAS_URL}?action=process&type=${type}&itemName=${encodeURIComponent(itemName)}&userName=${encodeURIComponent(profile.displayName)}&userEmail=${encodeURIComponent(email)}&dueDate=${encodeURIComponent(date)}`;
            
            try {
                await fetch(api);
                alert(`${type}成功！`);
                liff.sendMessages([{ type: 'text', text: type === '借出' ? `📖 已借閱 [${itemName}]\n預計歸還：${date}` : `✅ 已歸還 [${itemName}]` }]);
                location.reload();
            } catch (err) {
                alert("連線逾時，請檢查網路。");
                document.getElementById('app').style.opacity = "1";
            }
        }

        init();
    </script>
</body>
</html>
