<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉義分部物資借閱</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 10px; margin: 0; }
        .view-switcher { display: flex; gap: 5px; margin-bottom: 15px; background: white; padding: 5px; border-radius: 8px; }
        .mode-btn { flex: 1; padding: 8px; border: none; background: none; border-radius: 5px; font-size: 13px; cursor: pointer; color: #666; }
        .mode-btn.active { background: var(--primary); color: white; }

        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .photo { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .content { padding: 12px; }
        .status-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .available { background: #dcfce7; color: #166534; }
        .borrowed { background: #fee2e2; color: #991b1b; }
        .due-info { font-size: 11px; color: #e53e3e; margin-left: 5px; font-weight: normal; }

        /* 彈窗樣式 */
        #detail-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-body { background: white; width: 90%; max-height: 85%; border-radius: 15px; padding: 20px; overflow-y: auto; }
        .input-group { margin: 15px 0; }
        label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; margin-top: 10px; font-weight: bold; cursor: pointer; color: white; }
        .btn-blue { background: var(--primary); }
        .btn-gray { background: #6c757d; }
    </style>
</head>
<body>
    <div id="user-info" style="font-size: 13px; margin: 10px; color: #333;">載入中...</div>
    
    <div class="view-switcher">
        <button class="mode-btn active" onclick="switchView('card', this)">大圖</button>
        <button class="mode-btn" onclick="switchView('grid', this)">網格</button>
    </div>

    <div id="app" class="view-card"></div>

    <div id="detail-modal">
        <div class="modal-body">
            <h3 id="modal-title" style="margin-top:0"></h3>
            <div id="modal-desc" style="font-size: 14px; color: #444; margin-bottom:15px; border-left: 3px solid #ddd; padding-left: 10px;"></div>
            <div style="font-size: 12px; color: #888;">🧰 配件清單：<span id="modal-checklist"></span></div>
            
            <hr style="border:0; border-top:1px solid #eee; margin: 20px 0;">
            
            <div class="input-group">
                <label>您的 Email (逾期通知用)</label>
                <input type="email" id="borrow-email" placeholder="example@gmail.com">
            </div>
            <div class="input-group">
                <label>預計歸還日期 (預設2週後)</label>
                <input type="date" id="borrow-date">
            </div>
            
            <button class="btn btn-blue" onclick="confirmBorrow()">確認登記借用</button>
            <button class="btn btn-gray" style="background:#eee; color:#666" onclick="closeModal()">取消</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyxtge8LVGHeu0Uag82TqkypW7GF32rEKvZ4E5-PHyUKUSbEShBxkyxz-DK2XJ3f_Qm/exec; 
        const LIFF_ID = "2009125879-jcbSh64X";
        let inventoryData = [];
        let currentItem = null;
        let profile = {};

        async function init() {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            profile = await liff.getProfile();
            document.getElementById('user-info').innerText = `👋 您好，${profile.displayName}`;
            fetchData();
        }

        async function fetchData() {
            const response = await fetch(`${GAS_URL}?action=getInventory`);
            inventoryData = await response.json();
            render();
        }

        function render() {
            const app = document.getElementById('app');
            app.innerHTML = inventoryData.map(item => `
                <div class="card">
                    <img src="${item.photo}" class="photo" onerror="this.src='https://via.placeholder.com/300?text=圖片載入中'">
                    <div class="content">
                        <div class="status-tag ${item.status === '可用' ? 'available' : 'borrowed'}">
                            ${item.status}
                            ${item.status !== '可用' ? `<span class="due-info">(預計歸還：${item.dueDate || '未知'})</span>` : ''}
                        </div>
                        <div style="font-weight:bold; font-size:17px; margin-top:5px;">${item.name}</div>
                        <button class="btn ${item.status === '可用' ? 'btn-blue' : 'btn-gray'}" 
                                onclick="${item.status === '可用' ? `showDetail('${item.name}')` : `handleReturn('${item.name}')`}">
                            ${item.status === '可用' ? '查看詳情 / 借閱' : '辦理歸還'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function showDetail(name) {
            currentItem = inventoryData.find(i => i.name === name);
            document.getElementById('modal-title').innerText = currentItem.name;
            document.getElementById('modal-desc').innerText = currentItem.recommend;
            document.getElementById('modal-checklist').innerText = currentItem.checkList;
            
            // 自動計算兩週後日期
            const twoWeeksLater = new Date();
            twoWeeksLater.setDate(twoWeeksLater.getDate() + 14);
            document.getElementById('borrow-date').value = twoWeeksLater.toISOString().split('T')[0];
            
            document.getElementById('detail-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }

        async function confirmBorrow() {
            const email = document.getElementById('borrow-email').value;
            const date = document.getElementById('borrow-date').value;

            if (!email.includes("@")) return alert("請填寫正確的 Email");
            if (!date) return alert("請選擇歸還日期");

            document.getElementById('detail-modal').style.opacity = "0.5";
            const api = `${GAS_URL}?action=process&type=借出&itemName=${encodeURIComponent(currentItem.name)}&userName=${encodeURIComponent(profile.displayName)}&userEmail=${encodeURIComponent(email)}&dueDate=${encodeURIComponent(date)}`;
            
            await fetch(api);
            alert("借閱成功！");
            liff.sendMessages([{ type: 'text', text: `📖 已借閱 [${currentItem.name}]\n歸還日：${date}` }]);
            location.reload();
        }

        async function handleReturn(name) {
            if(!confirm(`確認歸還 [${name}]？`)) return;
            const api = `${GAS_URL}?action=process&type=歸還&itemName=${encodeURIComponent(name)}&userName=${encodeURIComponent(profile.displayName)}&userEmail=-&dueDate=-`;
            await fetch(api);
            alert("歸還成功！");
            location.reload();
        }

        init();
    </script>
</body>
</html>
